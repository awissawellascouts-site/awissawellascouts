<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & OG Tags -->
    <meta name="description" content="Awissawella Scouts is an active Scout branch committed to developing disciplined youth through outdoor activities and leadership training.">
    <meta property="og:title" content="Awissawella Scout Association">
    <meta property="og:description" content="Awissawella Scouts is an active Scout branch committed to developing disciplined youth through outdoor activities and leadership training.">
    <meta property="og:image" content="../image-icon/org awi logo.png">
    <meta property="twitter:card" content="summary_large_image">
    <title>Awissawella Scout - Creative Circle</title>
    <link rel="icon" type="image/x-icon" href="../image-icon/org awi logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../circle/Circle.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../navbar/nav.css">

</head>

<body>
    <!-- .................................................................................................. -->
    <div id="navbar-placeholder" data-base-path=".."></div>

    <script src="../navbar/nav.js"></script>

    <!-- .................................................................................................. -->

    <section class="school-events">
        <div class="container">
            <div class="content-side">
                <h1 class="title-1"> Scouts Creative Circle </h1>


                <p class="description">
                    Unleash your creativity and show the world what you can do! Join the Scout Creative Circle to turn
                    your artistic talents into a global impact. Whether it’s design, art, or photography, this is your
                    stage to shine and inspire
                </p>

                <button class="get-started-btn">JOIN WITH US</button>
            </div>

            <div class="image-side">
                <img src="../circle/scout creative hero.png" alt="scout creative hero">
            </div>
        </div>
    </section>

    <section class="circle">
        <div id="wrapper">
            <div class="filter-tabs" id="category-filters">
                <button class="tab active" onclick="filterCards('All')">All Talents</button>
            </div>
            <div class="masonry-grid" id="talent-grid"></div>
        </div>

        <div id="modal-overlay" onclick="closeMedia()">
            <span class="close-btn">&times;</span>
            <div id="modal-content" onclick="event.stopPropagation()"></div>
        </div>
    </section>
    <script src="../circle/Circle.js"></script>

    <div id="footer-1"></div>

    <!-- Firebase Compat SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../footer/footer.js"></script>
</body>

</html>
